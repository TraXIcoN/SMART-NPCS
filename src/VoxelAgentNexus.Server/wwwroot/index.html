<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Voxel-Agent-Nexus — Town of Beginnings</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: ui-sans-serif, system-ui, sans-serif; background: #0b0b10; color: #e8e8ea; }
    #view { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }
    .panel { position: fixed; background: rgba(15,15,21,0.82); border: 1px solid #2a2a34; border-radius: 10px; backdrop-filter: blur(6px); }
    #top { top: 12px; left: 12px; padding: 10px 14px; font-weight: 700; }
    #top small { font-weight: 400; color: #9a9aa6; margin-left: 8px; }
    #chatwrap { top: 12px; right: 12px; width: 320px; max-height: 60vh; display: flex; flex-direction: column; padding: 10px; }
    #log { flex: 1; overflow-y: auto; max-height: 46vh; font-size: 13px; line-height: 1.5; }
    #log div { margin-bottom: 3px; }
    #log .npc b { color: #f0997b; } #log .me b { color: #5dcaa5; } #log .you b { color: #85b7eb; } #log .sys { color: #6b6b78; font-style: italic; }
    #chatform { display: flex; gap: 8px; margin-top: 8px; }
    #msg { flex: 1; padding: 9px; border-radius: 8px; border: 1px solid #2c2c36; background: #1b1b22; color: #e8e8ea; }
    #say { padding: 9px 13px; border-radius: 8px; border: 0; background: #6a61e0; color: #fff; font-weight: 600; cursor: pointer; }
    #hint { bottom: 12px; left: 12px; padding: 8px 12px; font-size: 12px; color: #9a9aa6; }
  </style>
</head>
<body>
  <canvas id="view" tabindex="0"></canvas>
  <div id="top" class="panel">Town of Beginnings <small id="status">starting…</small></div>
  <div id="chatwrap" class="panel">
    <div id="log"></div>
    <form id="chatform"><input id="msg" placeholder="Say something to the nearest NPC…" autocomplete="off" /><button id="say" type="submit">Say</button></form>
  </div>
  <div id="hint" class="panel">WASD / arrows to move · drag to orbit · walk up to an NPC (orange) and talk</div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.7/signalr.min.js"></script>
  <script>
    // ---- glTF model registry (swap-later seam, ADR per art-direction.md) -------
    // When CC0 models are dropped into wwwroot/assets/, map them here by NPC id.
    // e.g. { "npc_brom": "assets/characters/blacksmith.glb" }. Empty = placeholders.
    const MODELS = {};

    const canvas = document.getElementById("view");
    const logEl = document.getElementById("log");
    const statusEl = document.getElementById("status");

    let myId = null;
    const myPos = { x: 0, y: 64, z: 0 };
    const agents = new Map(); // id -> { mesh, label, target }

    // SignalR JSON casing can be Pascal or camel — read both.
    const gp = (o, name) => { if (o == null) return undefined; if (o[name] !== undefined) return o[name]; const c = name.charAt(0).toLowerCase() + name.slice(1); return o[c]; };

    function append(cls, who, text) {
      const div = document.createElement("div");
      div.className = cls; div.innerHTML = `<b>${who}</b>: ${text}`;
      logEl.appendChild(div); logEl.scrollTop = logEl.scrollHeight;
    }

    async function createEngine() {
      if (await BABYLON.WebGPUEngine.IsSupportedAsync) {
        const e = new BABYLON.WebGPUEngine(canvas, { antialias: true });
        await e.initAsync();
        statusEl.textContent = "· WebGPU";
        return e;
      }
      statusEl.textContent = "· WebGL fallback";
      return new BABYLON.Engine(canvas, true);
    }

    function mat(scene, r, g, b) {
      const m = new BABYLON.StandardMaterial("m" + Math.random(), scene);
      m.diffuseColor = new BABYLON.Color3(r, g, b);
      m.specularColor = BABYLON.Color3.Black();
      return m;
    }

    function buildTown(scene) {
      const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 240, height: 240 }, scene);
      ground.material = mat(scene, 0.34, 0.48, 0.27);

      const box = (x, z, w, h, d, c) => {
        const m = BABYLON.MeshBuilder.CreateBox("b", { width: w, height: h, depth: d }, scene);
        m.position = new BABYLON.Vector3(x, h / 2, z); m.material = mat(scene, c[0], c[1], c[2]); return m;
      };
      // Placeholder buildings near the NPC work spots + plaza (real glTF later).
      box(6, 4, 6, 4, 6, [0.45, 0.32, 0.26]);   // blacksmith
      box(-4, 8, 5, 3.5, 5, [0.34, 0.42, 0.30]); // herbalist hut
      box(-12, -10, 6, 4, 7, [0.4, 0.36, 0.3]);  // house
      box(12, -8, 6, 4, 7, [0.4, 0.36, 0.3]);    // house
      const well = BABYLON.MeshBuilder.CreateCylinder("well", { diameter: 2.4, height: 1 }, scene);
      well.position = new BABYLON.Vector3(0, 0.5, 0); well.material = mat(scene, 0.5, 0.5, 0.55);
      // a few trees
      for (const [tx, tz] of [[18, 14], [-18, 16], [22, -16], [-22, -14], [-8, 20]]) {
        const trunk = box(tx, tz, 0.8, 2, 0.8, [0.35, 0.25, 0.16]);
        const leaves = BABYLON.MeshBuilder.CreateSphere("l", { diameter: 3 }, scene);
        leaves.position = new BABYLON.Vector3(tx, 3, tz); leaves.material = mat(scene, 0.27, 0.45, 0.26);
      }
    }

    function dayState(timeOfDay) {
      const hour = timeOfDay ? (parseInt(String(timeOfDay).split(":")[0], 10) || 0) : 12;
      const d = Math.max(0.05, Math.sin(((hour - 6) / 12) * Math.PI)); // ~0 night, 1 midday
      return d;
    }

    (async function main() {
      const engine = await createEngine();
      const scene = new BABYLON.Scene(engine);
      scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
      scene.fogDensity = 0.006;

      const hemi = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
      const sun = new BABYLON.DirectionalLight("sun", new BABYLON.Vector3(-1, -2, -1), scene);

      const camera = new BABYLON.ArcRotateCamera("cam", -Math.PI / 2, 1.05, 30, BABYLON.Vector3.Zero(), scene);
      camera.attachControl(canvas, true);
      camera.lowerRadiusLimit = 8; camera.upperRadiusLimit = 70; camera.upperBetaLimit = 1.45;

      buildTown(scene);

      let ui = null;
      try { ui = BABYLON.GUI.AdvancedDynamicTexture.CreateFullscreenUI("ui", true, scene); } catch (e) { /* no GUI */ }

      function makeAgent(id, name, kind, isMe) {
        const mesh = BABYLON.MeshBuilder.CreateCapsule("a_" + id, { radius: 0.45, height: 1.8 }, scene);
        mesh.material = mat(scene, ...(kind === "npc" ? [0.94, 0.62, 0.15] : (isMe ? [0.36, 0.79, 0.65] : [0.52, 0.72, 0.92])));
        let label = null;
        if (ui) {
          label = new BABYLON.GUI.TextBlock(); label.text = name || id; label.color = "white";
          label.fontSize = 13; label.outlineWidth = 4; label.outlineColor = "black";
          ui.addControl(label); label.linkWithMesh(mesh); label.linkOffsetY = -42;
        }
        return { mesh, label, kind, target: new BABYLON.Vector3(0, 0.9, 0) };
      }

      function applySnapshot(s) {
        const list = gp(s, "Agents") || [];
        const seen = new Set();
        for (const a of list) {
          const id = gp(a, "Id"); seen.add(id);
          const kind = gp(a, "Kind"); const isMe = id === myId;
          let rec = agents.get(id);
          if (!rec) { rec = makeAgent(id, gp(a, "Name"), kind, isMe); agents.set(id, rec); if (isMe) camera.lockedTarget = rec.mesh; }
          rec.target.set(gp(a, "X"), 0.9, gp(a, "Z"));
        }
        for (const [id, rec] of agents) {
          if (!seen.has(id)) { rec.mesh.dispose(); if (rec.label) rec.label.dispose(); agents.delete(id); }
        }
        // day/night
        const d = dayState(gp(s, "TimeOfDay"));
        hemi.intensity = 0.35 + 0.65 * d; sun.intensity = 0.2 + 0.8 * d;
        const sky = new BABYLON.Color4(0.05 + 0.45 * d, 0.06 + 0.55 * d, 0.1 + 0.6 * d, 1);
        scene.clearColor = sky; scene.fogColor = new BABYLON.Color3(sky.r, sky.g, sky.b);
        statusEl.textContent = `· ${gp(s, "TimeOfDay") || "--:--"} · tick ${gp(s, "Tick") ?? 0} · ${list.length} in town`;
      }

      scene.onBeforeRenderObservable.add(() => {
        const t = Math.min(1, engine.getDeltaTime() / 120); // smoothing toward target
        for (const rec of agents.values()) {
          rec.mesh.position = BABYLON.Vector3.Lerp(rec.mesh.position, rec.target, t);
        }
      });

      engine.runRenderLoop(() => scene.render());
      window.addEventListener("resize", () => engine.resize());

      // ---- networking ----------------------------------------------------------
      const connection = new signalR.HubConnectionBuilder().withUrl("/hub").withAutomaticReconnect().build();
      connection.on("Welcome", (id, name) => { myId = id; const d = document.createElement("div"); d.className = "sys"; d.textContent = `you joined as ${name}`; logEl.appendChild(d); });
      connection.on("Snapshot", (s) => applySnapshot(s));
      connection.on("Dialogue", (dm) => {
        const sid = gp(dm, "SpeakerId");
        const rec = agents.get(sid);
        let cls = "you";
        if (sid === myId) cls = "me";
        else if (rec && rec.kind === "npc") cls = "npc";
        append(cls, gp(dm, "SpeakerName"), gp(dm, "Text"));
      });
      connection.start().then(() => { if (statusEl.textContent.indexOf("·") < 0) statusEl.textContent = "· connected"; })
        .catch((err) => append("sys", "error", err.toString()));

      // ---- input ---------------------------------------------------------------
      canvas.focus();
      window.addEventListener("keydown", (e) => {
        if (document.activeElement === document.getElementById("msg")) return;
        let moved = true;
        if (e.key === "w" || e.key === "ArrowUp") myPos.z -= 1;
        else if (e.key === "s" || e.key === "ArrowDown") myPos.z += 1;
        else if (e.key === "a" || e.key === "ArrowLeft") myPos.x -= 1;
        else if (e.key === "d" || e.key === "ArrowRight") myPos.x += 1;
        else moved = false;
        if (moved) { if (e.key.startsWith("Arrow")) e.preventDefault(); if (connection.state === "Connected") connection.invoke("Move", myPos.x, myPos.y, myPos.z); }
      });
      document.getElementById("chatform").addEventListener("submit", (e) => {
        e.preventDefault(); const input = document.getElementById("msg"); const text = input.value.trim();
        if (text && connection.state === "Connected") { connection.invoke("Say", text); input.value = ""; }
      });
    })();
  </script>
</body>
</html>
