name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore VoxelAgentNexus.slnx

      - name: Build
        run: dotnet build VoxelAgentNexus.slnx --no-restore -c Release

      - name: Test
        run: dotnet test VoxelAgentNexus.slnx --no-build -c Release --verbosity normal
